name: 'happy-commit'
description: 'Celebrate pull-request when it contains a lucky commit'

branding:
  icon: award
  color: yellow

inputs:
  github-token:
    description: 'GitHub token used to read pull request metadata and create or update the managed comment'
    required: false
  GITHUB_TOKEN:
    description: 'Legacy alias for github-token'
    required: false
  additional-rules:
    description: 'Additional rules to check'
    required: false
  additional_rules:
    description: 'Legacy alias for additional-rules'
    required: false
  max-expected-occurrences:
    description: 'Celebrate built-in rules only when their expected occurrences at the current repository size stay below this value'
    required: false
  max_expected_occurrences:
    description: 'Legacy alias for max-expected-occurrences'
    required: false

outputs:
  lucky:
    description: "'true' if a lucky commit or PR number was found, 'false' otherwise"

runs:
  # https://json.schemastore.org/github-action.json
  # https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
  using: 'node24'
  main: 'dist/index.mjs'
